name: Build Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Run tests
        run: dotnet test --verbosity normal

      - name: Publish CryBarEditor
        working-directory: CryBarEditor
        run: dotnet publish -c Release -o out

      - name: Parse version from csproj
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content CryBarEditor/CryBarEditor.csproj
          $version = $csproj.Project.PropertyGroup[0].AssemblyVersion
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Clean build output
        shell: pwsh
        run: |
          Remove-Item CryBarEditor/out/*.pdb -ErrorAction SilentlyContinue
          Remove-Item CryBarEditor/out/*.json -ErrorAction SilentlyContinue

      - name: Zip release
        shell: pwsh
        run: |
          Compress-Archive -Path CryBarEditor/out/* -DestinationPath "CryBarEditor-${{ steps.version.outputs.VERSION }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: CryBarEditor-${{ steps.version.outputs.VERSION }}
          path: CryBarEditor/out/

      - name: Find draft release and attach zip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DRAFT_TAG=$(gh release list --json tagName,isDraft --jq '.[] | select(.isDraft) | .tagName' --limit 1)
          if [ -z "$DRAFT_TAG" ]; then
            echo "No draft release found, skipping upload"
            exit 0
          fi
          ASSETS=$(gh release view "$DRAFT_TAG" --json assets --jq '.assets | length')
          if [ "$ASSETS" -gt 0 ]; then
            echo "Draft release $DRAFT_TAG already has $ASSETS attachment(s), skipping upload"
            exit 0
          fi
          echo "Attaching to draft release: $DRAFT_TAG"
          gh release upload "$DRAFT_TAG" "CryBarEditor-${{ steps.version.outputs.VERSION }}.zip"
